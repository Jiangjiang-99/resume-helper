<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历优化与求职信生成器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #f7f8fa;
            color: #333;
            padding: 2rem 1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 1.75rem;
            margin-bottom: 2rem;
            color: #222;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 8px;
            background-color: #2563eb;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .result-box {
            margin-top: 2rem;
            padding: 1rem;
            background: white;
            border-radius: 8px;
            border: 1px solid #eee;
            white-space: pre-wrap;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>简历优化与求职信生成器</h1>

    <div class="form-group">
        <label>阿里云百炼 API Key</label>
        <input type="password" id="apiKey" placeholder="请输入 sk- 开头的密钥">
    </div>

    <div class="form-group">
        <label>个人经历/项目/技能</label>
        <textarea id="experience" placeholder="请描述你的经历、项目、能力"></textarea>
    </div>

    <div class="form-group">
        <label>目标岗位</label>
        <input type="text" id="targetJob" placeholder="例如：产品经理、运营、前端开发">
    </div>

    <div class="form-group">
        <label>修改要求（多轮优化）</label>
        <textarea id="requirements" placeholder="例如：突出项目经验、精简描述、适配校招风格"></textarea>
    </div>

    <button id="generateBtn">一键生成/优化</button>

    <div class="result-box" id="resultBox"></div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const experienceInput = document.getElementById('experience');
        const targetJobInput = document.getElementById('targetJob');
        const requirementsInput = document.getElementById('requirements');
        const generateBtn = document.getElementById('generateBtn');
        const resultBox = document.getElementById('resultBox');

        generateBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            const experience = experienceInput.value.trim();
            const targetJob = targetJobInput.value.trim();
            const requirements = requirementsInput.value.trim();

            if (!apiKey || !experience || !targetJob) {
                alert('请填写 API Key、个人经历和目标岗位');
                return;
            }

            generateBtn.disabled = true;
            generateBtn.textContent = '生成中...';
            resultBox.textContent = '';

            try {
                const response = await fetch('https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        "model": "qwen-turbo",
                        "input": {
                            "messages": [
                                {
                                    "role": "system",
                                    "content": "你是专业的求职顾问，根据用户提供的经历、目标岗位和要求，生成一份优化后的简历内容或求职信，语言简洁专业，适配目标岗位。"
                                },
                                {
                                    "role": "user",
                                    "content": `个人经历/项目/技能：${experience}\n目标岗位：${targetJob}\n修改要求：${requirements}`
                                 }
                             ]
                         },
                         "parameters": {
                             "result_format": "text"
                         }
                     })
                 });
                 const data = await response.json();
                 if (data?.output?.text) {
                     resultBox.textContent = data.output.text;
                 } else {
                     resultBox.textContent = '生成失败，请检查 API Key 是否正确，或稍后重试。';
                 }
             } catch (err) {
                 console.error(err);
                 resultBox.textContent = '请求出错：' + err.message;
             } finally {
                 generateBtn.disabled = false;
                 generateBtn.textContent = '一键生成/优化';
             }
         });
     </script>
 </body>
 </html>

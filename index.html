<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简历优化与求职信生成器</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body {
    background: #f9fafb;
    padding: 20px;
    max-width: 700px;
    margin: 0 auto;
    color: #333;
}
.card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    margin-bottom: 20px;
}
h1 {
    font-size: 22px;
    margin-bottom: 8px;
    text-align: center;
    color: #111;
}
.desc {
    text-align: center;
    color: #666;
    font-size: 14px;
    margin-bottom: 20px;
}
.label {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
    display: block;
}
input, textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    margin-bottom: 16px;
    outline: none;
}
input:focus, textarea:focus {
    border-color: #165DFF;
}
textarea {
    min-height: 100px;
    resize: vertical;
}
.btn {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 10px;
}
.btn-primary {
    background: #165DFF;
    color: white;
}
.btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
.btn-second {
    background: #f2f3f5;
    color: #333;
}
.tip {
    background: #f0f7ff;
    color: #165DFF;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
}
.loading {
    color: #165DFF;
    font-size: 14px;
    text-align: center;
    padding: 10px 0;
    display: none;
}
.error {
    color: #F53F3F;
    font-size: 14px;
    padding: 10px 0;
    display: none;
}
.result {
    background: #f9fafb;
    padding: 16px;
    border-radius: 8px;
    min-height: 120px;
    white-space: pre-wrap;
    line-height: 1.6;
    font-size: 15px;
    border: 1px solid #eee;
}
</style>
</head>
<body>

<div class="card">
    <h1>简历优化与求职信生成器</h1>
    <p class="desc">一键生成专业简历亮点与求职信，支持反复修改</p>

    <div class="tip">
        1. 输入阿里云百炼 API Key<br>
        2. 填写经历、岗位、修改要求<br>
        3. 点击生成，多次优化更完美
    </div>

    <label class="label">阿里云百炼 API Key（sk-开头）</label>
    <input type="password" id="apiKey" placeholder="请输入你的API Key，不会上传">

    <label class="label">个人经历/项目/技能</label>
    <textarea id="exp" placeholder="例如：3年产品运营，负责活动策划、用户增长…"></textarea>

    <label class="label">目标岗位</label>
    <textarea id="job" placeholder="例如：互联网产品经理、电商运营、行政专员"></textarea>

    <label class="label">修改要求（多轮优化）</label>
    <textarea id="prompt" placeholder="例如：更简洁、突出数据、写成正式求职信、控制200字"></textarea>

    <button class="btn btn-primary" id="generate">生成/继续优化</button>
    <button class="btn btn-second" id="clear">清空内容</button>

    <div class="loading" id="loading">正在生成中，请稍候…</div>
    <div class="error" id="error"></div>
</div>

<div class="card">
    <label class="label">生成结果</label>
    <div class="result" id="result"></div>
</div>

<script>
const MODEL = "qwen3.6-plus";
const URL = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions";
let history = [];

const $ = id => document.getElementById(id);
const apiKey = $("apiKey");
const exp = $("exp");
const job = $("job");
const prompt = $("prompt");
const result = $("result");
const loading = $("loading");
const error = $("error");

$("generate").onclick = async () => {
    const key = apiKey.value.trim();
    const e = exp.value.trim();
    const j = job.value.trim();
    const p = prompt.value.trim();

    if (!key) return showErr("请填写API Key");
    if (!e) return showErr("请填写个人经历");
    if (!j) return showErr("请填写目标岗位");

    const msg = `个人经历：${e}\n目标岗位：${j}\n要求：${p||"优化简历，突出优势"}`;
    loading.style.display = "block";
    error.style.display = "none";
    $("generate").disabled = true;

    try {
        const res = await fetch(URL, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${key}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: MODEL,
                messages: [
                    { role: "system", content: "你是专业求职顾问，擅长简历优化、求职信撰写，语言专业简洁，支持按要求反复修改。" },
                    ...history,
                    { role: "user", content: msg }
                ],
                temperature: 0.7
             })
         });
         const data = await res.json();
         if (!res.ok) throw new Error(data.error?.message || "请求失败");
         const reply = data.choices[0].message.content;
         history.push({ role: "user", content: msg });
         history.push({ role: "assistant", content: reply });
         result.innerText = reply;
         prompt.value = "";
     } catch (err) {
         showErr("错误：" + err.message);
     } finally {
         loading.style.display = "none";
         $("generate").disabled = false;
     }
 });
 $("clear").onclick = () => {
     exp.value = "";
     job.value = "";
     prompt.value = "";
     result.innerText = "";
     error.style.display = "none";
     history = [];
 };
 function showErr(text) {
     error.innerText = text;
     error.style.display = "block";
 }
 </script>
 </body>
 </html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简历优化与求职信生成器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{background:#f7f8fa;color:#333;padding:2rem 1rem;max-width:600px;margin:0 auto}
h1{text-align:center;font-size:1.5rem;margin-bottom:1rem}
.desc{background:#e6f7ff;padding:12px;border-radius:8px;margin-bottom:1.5rem;font-size:14px;line-height:1.5}
.form-group{margin-bottom:1rem}
label{display:block;font-weight:500;margin-bottom:6px}
input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px}
textarea{min-height:100px;resize:vertical}
button{width:100%;padding:12px;border:none;border-radius:8px;background:#2563eb;color:white;font-size:15px;cursor:pointer;margin-top:8px}
.btn-clear{background:#64748b}
.result-box{margin-top:1.5rem;padding:1rem;background:white;border-radius:8px;white-space:pre-wrap;line-height:1.6}
</style>
</head>
<body>
<h1>简历优化与求职信生成器</h1>
<div class="desc">
使用说明：<br>
1. 输入阿里云百炼API Key<br>
2. 填写个人经历、目标岗位<br>
3. 指令可写：生成简历 / 生成求职信 / 继续修改内容
</div>

<div class="form-group">
<label>阿里云百炼 API Key</label>
<input type="password" id="apiKey" placeholder="sk-开头密钥">
</div>

<div class="form-group">
<label>个人经历/项目/技能</label>
<textarea id="exp" placeholder="请输入你的经历、项目、技能"></textarea>
</div>

<div class="form-group">
<label>目标岗位</label>
<input type="text" id="job" placeholder="如：产品运营、前端开发">
</div>

<div class="form-group">
<label>生成/修改指令（支持多轮修改）</label>
<textarea id="cmd" placeholder="例：生成简历 | 生成求职信 | 再精简一点 | 更正式"></textarea>
</div>

<button id="generate">生成/迭代修改</button>
<button id="clear" class="btn-clear">重新开始（全部清空）</button>
<div class="result-box" id="result"></div>

<script>
const apiKey = document.getElementById('apiKey')
const exp = document.getElementById('exp')
const job = document.getElementById('job')
const cmd = document.getElementById('cmd')
const generate = document.getElementById('generate')
const clearBtn = document.getElementById('clear')
const result = document.getElementById('result')

let messages = []

const sysPrompt = `你是专业求职顾问，根据用户需求生成以下内容：
1. 用户要“简历”：输出标准校招简历，只写项目经历、专业技能，禁止负面文字，可直接复制使用。
2. 用户要“求职信”：生成正式、简洁、匹配岗位的求职信，语气真诚专业。
3. 支持用户后续修改指令，必须基于上一轮内容迭代优化，不能重写。
4. 只输出成品内容，不要解释、不要开场白、不要多余文字。`

generate.addEventListener('click',async()=>{
  const key = apiKey.value.trim()
  const c = cmd.value.trim()
  if(!key||!c){
    alert('请填写API Key和指令');
    return;
  }
  
  generate.disabled=true
  generate.textContent='处理中...'
  result.textContent = '请求中...'

  if(messages.length===0){
    messages.push({role:'system',content:sysPrompt})
    messages.push({role:'user',content:`个人经历：${exp.value}\n目标岗位：${job.value}\n需求：${c}`})
  }else{
    messages.push({role:'user',content:`修改要求：${c}`})
  }

  try{
    const res = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',{
      method:'POST',
      headers:{
        'Authorization':`Bearer ${key}`,
        'Content-Type':'application/json'
      },
      body:JSON.stringify({
        model:'qwen3.6-plus',
        messages:messages
      })
    })
    const data = await res.json()
    // 状态码非200时，把错误信息也显示出来
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}: ${JSON.stringify(data, null, 2)}`);
    }
    const reply = data.choices?.[0]?.message?.content||'生成失败：未获取到内容'
    result.textContent = reply
    messages.push({role:'assistant',content:reply})
  }catch(e){
    // 关键修改：把完整错误信息显示出来，方便排查
    result.textContent = `生成失败：${e.message}`
  }finally{
    generate.disabled=false
    generate.textContent='生成/迭代修改'
  }
})

clearBtn.addEventListener('click',()=>{
  messages=[]
  result.textContent=''
  apiKey.value=''
  exp.value=''
  job.value=''
  cmd.value=''
  alert('已完全清空，可以重新开始')
})
</script>
</body>
</html>
